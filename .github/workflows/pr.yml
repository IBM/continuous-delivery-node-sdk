name: pull-request

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    # Allow workflow to be triggered manually.
    inputs:
      skip_integration_tests:
        description: 'Skip integration tests'
        required: false
        type: boolean
        default: false

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install detect-secrets
        run: |
          pip install --upgrade "git+https://github.com/ibm/detect-secrets.git@master#egg=detect-secrets"

      - name: Run detect-secrets
        run: |
          detect-secrets scan --update .secrets.baseline
          detect-secrets -v audit --report --fail-on-unaudited --fail-on-live --fail-on-audited-real .secrets.baseline

  build:
    name: Test on Node.js ${{ matrix.node-version }}
    needs: detect-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Display Node.js and npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test-unit

      - name: Create .env files
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.skip_integration_tests)
        run: |
          set -e
          # Verify all required variables are set
          required_vars=(
            "CD_TOOLCHAIN_URL"
            "CD_TOOLCHAIN_AUTH_TYPE"
            "CLOUD_API_KEY"
            "CD_TOOLCHAIN_EVENT_NOTIFICATIONS_SERVICE_CRN"
            "CD_TOOLCHAIN_RESOURCE_GROUP_ID"
            "CD_TEKTON_PIPELINE_URL"
            "CD_TEKTON_PIPELINE_AUTH_TYPE"
            "CD_TEKTON_PIPELINE_RESOURCE_GROUP_ID"
          )
          
          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "Error: Required variable $var is not set"
              exit 1
            fi
          done
          # cd_toolchain_v2.env
          echo "CD_TOOLCHAIN_URL=${{ vars.CD_TOOLCHAIN_URL }}" >> cd_toolchain_v2.env
          echo "CD_TOOLCHAIN_AUTH_TYPE=${{ vars.CD_TOOLCHAIN_AUTH_TYPE }}" >> cd_toolchain_v2.env
          echo "CD_TOOLCHAIN_APIKEY=${{ secrets.CLOUD_API_KEY }}" >> cd_toolchain_v2.env
          echo "CD_TOOLCHAIN_EVENT_NOTIFICATIONS_SERVICE_CRN=${{ vars.CD_TOOLCHAIN_EVENT_NOTIFICATIONS_SERVICE_CRN }}" >> cd_toolchain_v2.env
          echo "CD_TOOLCHAIN_RESOURCE_GROUP_ID=${{ vars.CD_TOOLCHAIN_RESOURCE_GROUP_ID }}" >> cd_toolchain_v2.env

          # cd_tekton_pipeline_v2.env - pipeline env vars
          echo "CD_TEKTON_PIPELINE_URL=${{ vars.CD_TEKTON_PIPELINE_URL }}" >> cd_tekton_pipeline_v2.env
          echo "CD_TEKTON_PIPELINE_AUTH_TYPE=${{ vars.CD_TEKTON_PIPELINE_AUTH_TYPE }}" >> cd_tekton_pipeline_v2.env
          echo "CD_TEKTON_PIPELINE_APIKEY=${{ secrets.CLOUD_API_KEY }}" >> cd_tekton_pipeline_v2.env
          echo "CD_TEKTON_PIPELINE_RESOURCE_GROUP_ID=${{ vars.CD_TEKTON_PIPELINE_RESOURCE_GROUP_ID }}" >> cd_tekton_pipeline_v2.env

          # cd_tekton_pipeline_v2.env - toolchain env vars
          echo "CD_TOOLCHAIN_URL=${{ vars.CD_TOOLCHAIN_URL }}" >> cd_tekton_pipeline_v2.env
          echo "CD_TOOLCHAIN_AUTH_TYPE=${{ vars.CD_TOOLCHAIN_AUTH_TYPE }}" >> cd_tekton_pipeline_v2.env
          echo "CD_TOOLCHAIN_APIKEY=${{ secrets.CLOUD_API_KEY }}" >> cd_tekton_pipeline_v2.env
          echo "CD_TOOLCHAIN_RESOURCE_GROUP_ID=${{ vars.CD_TOOLCHAIN_RESOURCE_GROUP_ID }}" >> cd_tekton_pipeline_v2.env
          
          # Verify files were created successfully
          if [ ! -f cd_toolchain_v2.env ] || [ ! -f cd_tekton_pipeline_v2.env ]; then
            echo "Error: Failed to create .env files"
            exit 1
          fi
          
          echo "✓ Environment files created successfully"

      - name: Run integration tests
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.skip_integration_tests)
        run: npm run test-integration

      - name: Cleanup .env files
        if: always() && (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.skip_integration_tests))
        run: |
          rm -f cd_tekton_pipeline_v2.env cd_toolchain_v2.env
          echo "✓ Environment files cleaned up"
      - name: Run linter
        run: npm run lint

      - name: Check packages
        run: npm run check-packages
